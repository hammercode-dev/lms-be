<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirim Email Reset Password - Hammercode</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: #f5f7fa;
      }

      .container {
        max-width: 500px;
        margin: 5rem auto;
        padding: 2rem;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }

      h1 {
        color: #1e3a8a;
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
      }

      p {
        color: #4b5563;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #1e3a8a;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 1rem;
      }

      button {
        background-color: #0ea5e9;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #0284c7;
      }

      .footer {
        text-align: center;
        margin-top: 2rem;
        color: #6b7280;
        font-size: 0.875rem;
      }

      .footer a {
        color: #0ea5e9;
        text-decoration: none;
      }

      @media (max-width: 768px) {
        .container {
          margin: 2rem 1rem;
          padding: 1.5rem;
        }

        .nav-links {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Reset Password</h1>
      <a href="{{.}}">
        <button>Reset Password</button>
      </a>
    </div>
  </body>
</html>
